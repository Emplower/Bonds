<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Купоны">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" id="pwa-manifest">
<title>Купоны · Виджет</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d1117;
    --card:    #161b22;
    --card2:   #1c2333;
    --border:  #30363d;
    --accent:  #3fb950;
    --accent2: #f78166;
    --accent3: #79c0ff;
    --purple:  #bc8cff;
    --yellow:  #e3b341;
    --text:    #e6edf3;
    --text2:   #8b949e;
    --text3:   #484f58;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo {
    width: 36px; height: 36px;
    background: rgba(63,185,80,0.12);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-title { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    width: 34px; height: 34px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text2);
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HERO CARDS ── */
  .hero {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .hero-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
  }
  .hero-label { font-size: 9px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
  .hero-val   { font-size: 22px; font-weight: 800; line-height: 1; }
  .hero-sub   { font-size: 10px; color: var(--text2); margin-top: 3px; }
  .green  { color: var(--accent); }
  .orange { color: var(--accent2); }
  .blue   { color: var(--accent3); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 10px 16px 0;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    font-size: 12px; font-weight: 700;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    -webkit-appearance: none;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CONTENT ── */
  .content {
    padding: 12px 16px calc(16px + var(--safe-bottom));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── SECTION HEADER ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 10px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .section-sum {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent3);
  }

  /* ── COUPON ROW ── */
  .coupon-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 6px;
    transition: all 0.12s;
  }
  .coupon-row:active { transform: scale(0.98); }
  .coupon-row.today-row { border-color: rgba(63,185,80,0.35); background: rgba(63,185,80,0.05); }
  .coupon-row.past-row  { opacity: 0.6; }

  .type-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ofz  { background: var(--purple); }
  .dot-corp { background: var(--accent); }
  .dot-muni { background: var(--accent2); }

  .row-info { flex: 1; min-width: 0; }
  .row-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-meta { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; gap: 6px; }
  .row-prc  { color: var(--yellow); }

  .row-right { text-align: right; flex-shrink: 0; }
  .row-total { font-size: 15px; font-weight: 800; color: var(--accent); }
  .row-total.past { color: var(--text2); }
  .row-when  { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .row-when.today { color: var(--accent); font-weight: 700; }

  /* ── DAY SEPARATOR ── */
  .day-sep {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 0 8px;
  }
  .day-sep-line { flex: 1; height: 1px; background: var(--border); }
  .day-sep-text { font-size: 11px; font-weight: 700; color: var(--text3); white-space: nowrap; }
  .day-sep-sum  { font-size: 11px; font-weight: 700; color: var(--text2); }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text2);
  }
  .empty-icon  { font-size: 40px; margin-bottom: 10px; }
  .empty-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-sub   { font-size: 12px; line-height: 1.6; }

  /* ── STATUS ── */
  .status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    font-size: 11px; color: var(--text2);
    border-bottom: 1px solid var(--border);
    min-height: 32px;
  }
  .sdot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
    transition: all 0.3s;
  }
  .sdot.ok      { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
  .sdot.loading { background: var(--yellow); animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .fade { animation: fadeIn 0.2s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">📅</div>
    <div>
      <div class="header-title">Купон<span>.</span>Виджет</div>
      <div class="header-sub" id="hdr-sub">загрузка...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="refreshBtn" onclick="loadData(true)" title="Обновить">⟳</button>
    <a class="icon-btn" href="index.html" title="Открыть полное приложение">↗</a>
  </div>
</div>

<div class="status-bar">
  <div class="sdot" id="sdot"></div>
  <span id="status-text">Получение данных...</span>
</div>

<div class="hero">
  <div class="hero-card">
    <div class="hero-label">Сегодня</div>
    <div class="hero-val green" id="h-today">—</div>
    <div class="hero-sub" id="h-today-sum">₽</div>
  </div>
  <div class="hero-card">
    <div class="hero-label">7 дней</div>
    <div class="hero-val orange" id="h-week">—</div>
    <div class="hero-sub" id="h-week-sum">₽</div>
  </div>
  <div class="hero-card">
    <div class="hero-label">30 дней</div>
    <div class="hero-val blue" id="h-month">—</div>
    <div class="hero-sub" id="h-month-sum">₽</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-soon"  onclick="switchTab('soon')">⏳ Скоро</button>
  <button class="tab"        id="tab-today" onclick="switchTab('today')">💰 Сегодня</button>
  <button class="tab"        id="tab-week"  onclick="switchTab('week')">📅 7 дней</button>
  <button class="tab"        id="tab-past"  onclick="switchTab('past')">📜 История</button>
</div>

<div class="content" id="content">
  <div class="empty">
    <div class="empty-icon">⏳</div>
    <div class="empty-title">Загрузка...</div>
  </div>
</div>

<script>
// ── ПОРТФЕЛЬ (дефолт, если localStorage пуст) ──
const DEFAULT_BONDS = [
  { isin: 'RU000A105FZ9', name: 'ОФЗ 26241',                 type: 'ofz',  qty: 34,  rate: 47.37 },
  { isin: 'RU000A0JV4Q1', name: 'ОФЗ 29010',                 type: 'ofz',  qty: 200, rate: 95.44 },
  { isin: 'RU000A0JXFM1', name: 'ОФЗ 26221',                 type: 'ofz',  qty: 300, rate: 38.39 },
  { isin: 'RU000A0ZYR91', name: 'ГТЛК БО 001Р-08',           type: 'corp', qty: 250, rate: 28.22 },
  { isin: 'RU000A100EF5', name: 'ОФЗ 26230',                 type: 'ofz',  qty: 300, rate: 38.39 },
  { isin: 'RU000A1017J5', name: 'Газпром нефть БО-003P-02R', type: 'corp', qty: 300, rate: 17.83 },
  { isin: 'RU000A1038V6', name: 'ОФЗ 26238',                 type: 'ofz',  qty: 400, rate: 35.40 },
  { isin: 'RU000A102BV4', name: 'ОФЗ 29020',                 type: 'ofz',  qty: 400, rate: 38.70 },
  { isin: 'RU000A10EMS7', name: 'Село Зелёное Холд. БО-01',  type: 'corp', qty: 250, rate: 14.59 },
  { isin: 'RU000A10ASW4', name: 'КАМАЗ ПАО БО-П14',          type: 'corp', qty: 400, rate: 15.51 },
  { isin: 'RU000A10CS75', name: 'Аэрофлот П02-БО-02',        type: 'corp', qty: 153, rate: 14.14 },
  { isin: 'RU000A1033Z8', name: 'Гор.Обл.Займ Москвы 74 в.', type: 'muni', qty: 200, rate: 36.80 },
  { isin: 'RU000A10ASC6', name: 'ПАО ЛК Европлан 001P-09',   type: 'corp', qty: 400, rate: 19.73 },
  { isin: 'RU000A10DPB8', name: 'КАМАЗ ПАО БО-П19',          type: 'corp', qty: 400, rate: 14.96 },
  { isin: 'RU000A10DYC8', name: 'ФПК 002Р-01',               type: 'corp', qty: 400, rate: 12.66 },
  { isin: 'RU000A1025A7', name: 'ОФЗ 29015',                 type: 'ofz',  qty: 290, rate: 40.27 },
  { isin: 'RU000A10D3K3', name: 'Почта России 003P-02',       type: 'corp', qty: 400, rate: 15.27 },
  { isin: 'RU000A10EA16', name: 'Почта России 003P-03',       type: 'corp', qty: 360, rate: 14.59 },
];

const CACHE_KEY = 'coupon_cache_v2';
const PORT_KEY  = 'coupon_portfolio_v1';
const CACHE_TTL = 6 * 60 * 60 * 1000;

let bonds      = [];
let couponData = {};
let currentTab = 'soon';
let isLoading  = false;

const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const wdays  = ['вс','пн','вт','ср','чт','пт','сб'];

// ── PWA MANIFEST ──
(function() {
  const m = { name:'Купонный Виджет', short_name:'Купоны', start_url:'.', display:'standalone',
    background_color:'#0d1117', theme_color:'#0d1117', orientation:'portrait',
    icons:[{ src:'https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f4c5.png', sizes:'192x192', type:'image/png' }] };
  const blob = new Blob([JSON.stringify(m)], { type:'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
})();

// ── ЗАГРУЗКА ПОРТФЕЛЯ ──
function initBonds() {
  try {
    const saved = localStorage.getItem(PORT_KEY);
    if (saved) {
      const arr = JSON.parse(saved);
      if (Array.isArray(arr) && arr.length) return arr.map(b => ({...b}));
    }
  } catch {}
  return DEFAULT_BONDS.map(b => ({...b}));
}

// ── КЭШ ──
function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const { ts, data, rates } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return false;
    Object.assign(couponData, data);
    if (rates) rates.forEach(r => {
      const b = bonds.find(x => x.isin === r.isin);
      if (b && r.rate) b.rate = r.rate;
    });
    return true;
  } catch { return false; }
}

function saveToCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ts: Date.now(), data: couponData,
      rates: bonds.map(b => ({ isin: b.isin, rate: b.rate }))
    }));
  } catch {}
}

// ── MOEX API ──
const secidCache = {};

async function resolveSecid(isin) {
  if (secidCache[isin]) return secidCache[isin];
  try {
    const res  = await fetch(`https://iss.moex.com/iss/securities.json?q=${isin}&iss.meta=off&limit=5`);
    const data = await res.json();
    const rows = data?.securities?.data || [];
    const cols = data?.securities?.columns || [];
    const row  = rows.find(r => r[cols.indexOf('isin')] === isin);
    const secid = row ? row[cols.indexOf('secid')] : isin;
    secidCache[isin] = secid;
    return secid;
  } catch { return isin; }
}

async function fetchAllCoupons(id) {
  let allRows = [], cols = null, start = 0;
  while (true) {
    try {
      const res  = await fetch(`https://iss.moex.com/iss/securities/${id}/bondization.json?iss.meta=off&limit=100&start=${start}`, { signal: AbortSignal.timeout(10000) });
      const data = await res.json();
      const c    = data.coupons;
      if (!c?.data) break;
      if (!cols) cols = c.columns;
      allRows = allRows.concat(c.data);
      if (c.data.length < 100) break;
      start += 100;
      if (start > 3000) break;
    } catch { break; }
  }
  return { cols, rows: allRows };
}

async function fetchBond(bond) {
  const todayStr = new Date().toISOString().slice(0,10);
  let nextDate = null, nextRate = null, nextValueprc = null, nextPeriod = null, nextFace = null;
  let lastDate = null, lastRate = null, lastValueprc = null, lastPeriod = null, lastFace = null;

  let { cols, rows } = await fetchAllCoupons(bond.isin);
  if (!rows.length) {
    const secid = await resolveSecid(bond.isin);
    if (secid !== bond.isin) { const r2 = await fetchAllCoupons(secid); cols = r2.cols; rows = r2.rows; }
  }

  if (cols && rows.length) {
    const iDate = cols.indexOf('coupondate'), iVal = cols.indexOf('value'),
          iPrc  = cols.indexOf('valueprc'),   iStart = cols.indexOf('startdate'),
          iFace = cols.indexOf('facevalue');
    const past   = rows.filter(r => r[iDate] && r[iDate] < todayStr);
    const future = rows.filter(r => r[iDate] && r[iDate] >= todayStr);
    if (past.length) {
      past.sort((a,b) => a[iDate]<b[iDate]?1:-1);
      const lp = past[0];
      lastDate = lp[iDate]; lastRate = lp[iVal]; lastValueprc = lp[iPrc]; lastFace = lp[iFace]||1000;
      if (lp[iStart]) lastPeriod = Math.round((new Date(lp[iDate])-new Date(lp[iStart]))/86400000);
    }
    if (future.length) {
      future.sort((a,b) => a[iDate]>b[iDate]?1:-1);
      const nf = future[0];
      nextDate = nf[iDate]; nextRate = nf[iVal]; nextValueprc = nf[iPrc]; nextFace = nf[iFace]||1000;
      if (nf[iStart]) nextPeriod = Math.round((new Date(nf[iDate])-new Date(nf[iStart]))/86400000);
    }
  }

  if (!nextDate) {
    try {
      const res  = await fetch(`https://iss.moex.com/iss/engines/stock/markets/bonds/securities/${bond.isin}.json?iss.meta=off&iss.only=securities`, { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      if (data.securities?.data?.length) {
        const c = data.securities.columns, bi = c.indexOf('BOARDID');
        const row = data.securities.data.find(r=>r[bi]==='TQOB'||r[bi]==='TQCB')||data.securities.data[0];
        const get = k => row[c.indexOf(k)];
        nextDate = get('NEXTCOUPON'); if (!nextRate) nextRate = get('COUPONVALUE');
        nextValueprc = get('COUPONPERCENT'); nextPeriod = get('COUPONPERIOD'); nextFace = 1000;
      }
    } catch {}
  }
  return { nextDate, nextRate, nextValueprc, nextPeriod, nextFace, lastDate, lastRate, lastValueprc, lastPeriod, lastFace };
}

async function pLimit(tasks, n=5) {
  const res = new Array(tasks.length); let idx = 0;
  async function w() { while(idx<tasks.length){const i=idx++;res[i]=await tasks[i]();} }
  await Promise.all(Array.from({length:Math.min(n,tasks.length)},w));
  return res;
}

// ── ФОРМАТТЕРЫ ──
function fmtMoney(n) {
  if (n==null) return '—';
  return n.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function fmtPrc(data, useNext=true) {
  const vp   = useNext ? data.nextValueprc : data.lastValueprc;
  const val  = useNext ? data.nextRate     : data.lastRate;
  const per  = useNext ? data.nextPeriod   : data.lastPeriod;
  const face = useNext ? data.nextFace     : data.lastFace;
  if (vp != null) return vp.toFixed(2) + '%';
  if (val != null && per && face) return ((val/face)*(365/per)*100).toFixed(2) + '%*';
  // fallback на прошлый для будущего
  if (useNext && data.lastValueprc != null) return data.lastValueprc.toFixed(2) + '%~';
  if (useNext && data.lastRate != null && data.lastPeriod && data.lastFace)
    return ((data.lastRate/data.lastFace)*(365/data.lastPeriod)*100).toFixed(2) + '%*~';
  return '—';
}

function fmtDate(dt) {
  return `${dt.getDate()} ${months[dt.getMonth()]}`;
}

// ── ЗАГРУЗКА ──
async function loadData(forceRefresh=false) {
  if (isLoading) return;
  isLoading = true;
  bonds = initBonds();

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('loading', 'Загрузка...');

  // Быстрый старт из кэша
  if (!forceRefresh && loadFromCache()) {
    setStatus('ok', 'Из кэша · обновляем...');
    updateHero(); renderContent();
  }

  let done = 0;
  await pLimit(bonds.map(bond => async () => {
    const d = await fetchBond(bond);
    couponData[bond.isin] = d;
    if (d.nextRate != null) bond.rate = d.nextRate;
    done++;
    setStatus('loading', `${done}/${bonds.length} бумаг...`);
  }), 5);

  saveToCache();
  btn.classList.remove('spinning');
  isLoading = false;

  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  setStatus('ok', `${time}`);
  document.getElementById('hdr-sub').textContent = `обновлено в ${time}`;
  updateHero();
  renderContent();
}

function setStatus(state, text) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('status-text').textContent = text;
}

// ── HERO ──
function updateHero() {
  const today = new Date(); today.setHours(0,0,0,0);
  let tCount=0, tSum=0, wCount=0, wSum=0, mCount=0, mSum=0;
  bonds.forEach(b => {
    const d = couponData[b.isin]; if (!d?.nextDate) return;
    const [y,mo,dy] = d.nextDate.split('-').map(Number);
    const dt = new Date(y,mo-1,dy);
    const diff = Math.round((dt-today)/86400000);
    const rate = d.nextRate ?? b.rate;
    const total = (rate||0)*b.qty;
    if (diff===0)              { tCount++; tSum+=total; }
    if (diff>=0&&diff<=7)      { wCount++; wSum+=total; }
    if (diff>=0&&diff<=30)     { mCount++; mSum+=total; }
  });
  document.getElementById('h-today').textContent    = tCount;
  document.getElementById('h-today-sum').textContent = tSum>0 ? Math.round(tSum).toLocaleString('ru-RU')+' ₽' : '—';
  document.getElementById('h-week').textContent     = wCount;
  document.getElementById('h-week-sum').textContent  = wSum>0 ? Math.round(wSum).toLocaleString('ru-RU')+' ₽' : '—';
  document.getElementById('h-month').textContent    = mCount;
  document.getElementById('h-month-sum').textContent = mSum>0 ? Math.round(mSum).toLocaleString('ru-RU')+' ₽' : '—';
}

// ── ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ──
function switchTab(tab) {
  currentTab = tab;
  ['soon','today','week','past'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  renderContent();
}

// ── РЕНДЕР ──
function renderContent() {
  const today = new Date(); today.setHours(0,0,0,0);
  const el    = document.getElementById('content');

  let items = [];

  if (currentTab === 'past') {
    // История: последний прошедший купон по каждой бумаге
    bonds.forEach(b => {
      const d = couponData[b.isin]; if (!d?.lastDate) return;
      const [y,mo,dy] = d.lastDate.split('-').map(Number);
      const dt   = new Date(y,mo-1,dy);
      const diff = Math.round((dt-today)/86400000);
      const rate = d.lastRate ?? b.rate;
      items.push({ bond:b, date:dt, diff, rate, data:d, isPast:true });
    });
    items.sort((a,b) => b.date-a.date);
  } else {
    // Будущие купоны
    bonds.forEach(b => {
      const d = couponData[b.isin]; if (!d?.nextDate) return;
      const [y,mo,dy] = d.nextDate.split('-').map(Number);
      const dt   = new Date(y,mo-1,dy);
      const diff = Math.round((dt-today)/86400000);
      if (diff < 0) return;
      const rate = d.nextRate ?? b.rate;
      items.push({ bond:b, date:dt, diff, rate, data:d, isPast:false });
    });
    if (currentTab==='today') items = items.filter(x=>x.diff===0);
    else if (currentTab==='week') items = items.filter(x=>x.diff<=7);
    else if (currentTab==='soon') items = items.filter(x=>x.diff<=30);
    items.sort((a,b)=>a.date-b.date);
  }

  if (!items.length) {
    const msgs = {
      today: ['💤','Сегодня выплат нет','Следующие выплаты — на вкладке «Скоро»'],
      week:  ['📭','На этой неделе тихо','Нет выплат в ближайшие 7 дней'],
      soon:  ['📆','Выплат нет','Нет купонов в ближайшие 30 дней'],
      past:  ['📜','Нет истории','Данные появятся после обновления'],
    };
    const [icon,title,sub] = msgs[currentTab]||['🔄','Нет данных','Нажмите ⟳ для загрузки'];
    el.innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
    return;
  }

  // Группируем по дате
  const groups = {};
  items.forEach(item => {
    const key = item.date.toISOString().slice(0,10);
    if (!groups[key]) groups[key] = { date:item.date, diff:item.diff, items:[], sum:0 };
    groups[key].items.push(item);
    groups[key].sum += (item.rate||0)*item.bond.qty;
  });

  let html = '';
  let gi   = 0;

  Object.values(groups).sort((a,b)=>currentTab==='past'?b.date-a.date:a.date-b.date).forEach(group => {
    const d        = group.date;
    const isToday  = group.diff === 0;
    const isPast   = currentTab === 'past';
    const diffAbs  = Math.abs(group.diff);
    const diffText = isToday ? 'сегодня' :
                     isPast  ? (group.diff===-1?'вчера':`${diffAbs} дн. назад`) :
                     group.diff===1 ? 'завтра' : `через ${group.diff} дн.`;

    html += `<div class="day-sep fade" style="animation-delay:${gi*30}ms">
      <div class="day-sep-line"></div>
      <div class="day-sep-text">${d.getDate()} ${months[d.getMonth()]} · ${wdays[d.getDay()]} · ${diffText}</div>
      <div class="day-sep-line"></div>
      <div class="day-sep-sum">${Math.round(group.sum).toLocaleString('ru-RU')} ₽</div>
    </div>`;

    group.items.forEach(({ bond, rate, data, isPast: ip }) => {
      const total   = Math.round((rate||0)*bond.qty);
      const prcStr  = fmtPrc(data, !ip);
      const dotCls  = `type-dot dot-${bond.type}`;
      const rowCls  = `coupon-row${isToday?' today-row':''}${ip?' past-row':''}`;
      html += `<div class="${rowCls} fade" style="animation-delay:${gi*30+15}ms">
        <div class="${dotCls}"></div>
        <div class="row-info">
          <div class="row-name">${bond.name}</div>
          <div class="row-meta">
            <span>${bond.qty} шт</span>
            <span>${fmtMoney(rate)} ₽</span>
            <span class="row-prc">${prcStr}</span>
          </div>
        </div>
        <div class="row-right">
          <div class="row-total${ip?' past':''}">${total.toLocaleString('ru-RU')} ₽</div>
          <div class="row-when${isToday?' today':''}">${ip?'выплачено':'итого'}</div>
        </div>
      </div>`;
      gi++;
    });
  });

  el.innerHTML = html;
}

// ── СТАРТ ──
loadData();
</script>
