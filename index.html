<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Купоны">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" id="pwa-manifest">
<title>Купонный календарь</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
 :root {
   --bg: #0d1117;
   --card: #161b22;
   --card2: #1c2333;
   --border: #30363d;
   --accent: #3fb950;
   --accent2: #f78166;
   --accent3: #79c0ff;
   --purple: #bc8cff;
   --yellow: #e3b341;
   --text: #e6edf3;
   --text2: #8b949e;
   --text3: #484f58;
   --safe-top: env(safe-area-inset-top, 0px);
   --safe-bottom: env(safe-area-inset-bottom, 0px);
 }

 * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

 html, body { height: 100%; overscroll-behavior: none; }

 body {
   font-family: 'Inter', -apple-system, sans-serif;
   background: var(--bg);
   color: var(--text);
   padding-top: var(--safe-top);
   padding-bottom: var(--safe-bottom);
   overflow-x: hidden;
 }

 /* ─── TOP BAR ─── */
 .topbar {
   position: sticky; top: 0; z-index: 100;
   background: rgba(13,17,23,0.92);
   backdrop-filter: blur(20px);
   -webkit-backdrop-filter: blur(20px);
   border-bottom: 1px solid var(--border);
   padding: 14px 16px 12px;
 }
 .topbar-row1 {
   display: flex; align-items: center; justify-content: space-between;
   margin-bottom: 12px;
 }
 .app-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
 .app-title span { color: var(--accent); }

 .refresh-btn {
   width: 36px; height: 36px;
   background: var(--card2);
   border: 1px solid var(--border);
   border-radius: 10px;
   color: var(--text2);
   font-size: 16px;
   cursor: pointer;
   display: flex; align-items: center; justify-content: center;
   transition: all 0.2s;
   -webkit-appearance: none;
 }
 .refresh-btn:active { transform: scale(0.92); background: var(--border); }
 .refresh-btn.spinning { animation: spin 1s linear infinite; }
 @keyframes spin { to { transform: rotate(360deg); } }

 /* ─── TABS ─── */
 .tabs {
   display: flex; gap: 4px;
   background: var(--card2);
   border-radius: 12px;
   padding: 4px;
   margin-bottom: 12px;
 }
 .tab-btn {
   flex: 1; text-align: center;
   padding: 8px 12px;
   border-radius: 10px;
   font-size: 13px; font-weight: 600;
   cursor: pointer;
   color: var(--text2);
   background: transparent;
   border: none;
   transition: all 0.2s;
   -webkit-appearance: none;
 }
 .tab-btn.active { background: var(--accent); color: #0d1117; }

 /* ─── FILTER PILLS ─── */
 .pills {
   display: flex; gap: 8px;
   overflow-x: auto;
   -webkit-overflow-scrolling: touch;
   scrollbar-width: none;
   padding-bottom: 2px;
 }
 .pills::-webkit-scrollbar { display: none; }
 .pill {
   flex-shrink: 0;
   padding: 7px 16px;
   border-radius: 20px;
   font-size: 13px; font-weight: 600;
   background: var(--card2);
   border: 1px solid var(--border);
   color: var(--text2);
   cursor: pointer;
   transition: all 0.15s;
   -webkit-appearance: none;
 }
 .pill:active { transform: scale(0.95); }
 .pill.active { background: var(--accent); border-color: var(--accent); color: #0d1117; }

 /* ─── STATUS ─── */
 .status-strip {
   display: flex; align-items: center; gap: 8px;
   padding: 10px 16px;
   font-size: 12px; color: var(--text2);
   border-bottom: 1px solid var(--border);
   min-height: 38px;
 }
 .dot {
   width: 6px; height: 6px;
   border-radius: 50%;
   background: var(--text3);
   flex-shrink: 0;
   transition: all 0.3s;
 }
 .dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
 .dot.loading { background: var(--yellow); animation: blink 0.8s infinite; }
 .dot.err { background: var(--accent2); }
 @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

 .progress {
   flex: 1; height: 2px;
   background: var(--border);
   border-radius: 2px;
   overflow: hidden;
   display: none;
 }
 .progress.show { display: block; }
 .progress-fill {
   height: 100%;
   background: linear-gradient(90deg, var(--accent), var(--accent3));
   border-radius: 2px;
   transition: width 0.25s ease;
 }

 /* ─── SUMMARY CARDS ─── */
 .summary {
   display: grid;
   grid-template-columns: repeat(4, 1fr);
   gap: 8px;
   padding: 12px 16px;
   border-bottom: 1px solid var(--border);
 }
 .s-card {
   background: var(--card);
   border: 1px solid var(--border);
   border-radius: 12px;
   padding: 10px 8px;
   text-align: center;
 }
 .s-label { font-size: 9px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
 .s-val { font-size: 20px; font-weight: 800; line-height: 1; }
 .s-val.green { color: var(--accent); }
 .s-val.orange { color: var(--accent2); }
 .s-val.blue { color: var(--accent3); }
 .s-val.gray { color: var(--text2); }

 /* ─── SCROLL AREA ─── */
 .scroll-area {
   overflow-y: auto;
   -webkit-overflow-scrolling: touch;
   padding: 16px;
   padding-bottom: calc(16px + var(--safe-bottom));
 }

 /* ─── DAY GROUP ─── */
 .day-group { margin-bottom: 20px; }
 .day-header {
   display: flex; align-items: center; gap: 10px;
   margin-bottom: 8px;
 }
 .day-badge {
   min-width: 52px; height: 52px;
   border-radius: 14px;
   background: var(--card);
   border: 1px solid var(--border);
   display: flex; flex-direction: column;
   align-items: center; justify-content: center;
   flex-shrink: 0;
 }
 .day-group.is-today .day-badge { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.4); }
 .day-group.is-past .day-badge { background: rgba(139,148,158,0.08); border-color: rgba(139,148,158,0.2); }
 .day-num { font-size: 22px; font-weight: 800; line-height: 1; }
 .day-group.is-today .day-num { color: var(--accent); }
 .day-group.is-past .day-num { color: var(--text2); }
 .day-wday { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-top: 1px; }
 .day-meta { flex: 1; }
 .day-full { font-size: 14px; font-weight: 700; color: var(--text); }
 .day-diff { font-size: 12px; color: var(--text2); margin-top: 2px; }
 .day-group.is-today .day-diff { color: var(--accent); font-weight: 600; }
 .day-group.is-past .day-diff { color: var(--text3); }
 .day-count-badge {
   font-size: 11px; font-weight: 700;
   color: var(--text2);
   background: var(--card);
   border: 1px solid var(--border);
   border-radius: 20px;
   padding: 4px 10px;
   white-space: nowrap;
 }

 /* ─── BOND ROW ─── */
 .bond-row {
   background: var(--card);
   border: 1px solid var(--border);
   border-radius: 14px;
   padding: 14px;
   margin-bottom: 8px;
   display: flex; align-items: center; gap: 12px;
   transition: all 0.15s;
 }
 .bond-row:active { transform: scale(0.98); background: var(--card2); }
 .bond-row.bond-past { opacity: 0.65; }

 .type-badge {
   width: 38px; height: 38px;
   border-radius: 10px;
   display: flex; align-items: center; justify-content: center;
   font-size: 10px; font-weight: 800;
   flex-shrink: 0;
   letter-spacing: 0.3px;
 }
 .type-ofz  { background: rgba(188,140,255,0.15); color: var(--purple);  border: 1px solid rgba(188,140,255,0.3); }
 .type-corp { background: rgba(63,185,80,0.12);   color: var(--accent);  border: 1px solid rgba(63,185,80,0.25); }
 .type-muni { background: rgba(247,129,102,0.12); color: var(--accent2); border: 1px solid rgba(247,129,102,0.25); }

 .bond-info { flex: 1; min-width: 0; }
 .bond-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .bond-meta { font-size: 11px; color: var(--text2); margin-top: 3px; display: flex; gap: 8px; align-items: center; }
 .bond-qty { background: var(--card2); border-radius: 4px; padding: 1px 6px; font-weight: 600; }
 .bond-prc { color: var(--yellow); font-weight: 600; }

 .bond-right { text-align: right; flex-shrink: 0; }
 .coupon-total { font-size: 16px; font-weight: 800; color: var(--accent); line-height: 1; }
 .coupon-total.past { color: var(--text2); }
 .coupon-per { font-size: 11px; color: var(--text2); margin-top: 3px; }

 /* ─── EMPTY ─── */
 .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
 .empty-icon { font-size: 48px; margin-bottom: 12px; }
 .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
 .empty-sub { font-size: 13px; line-height: 1.5; }

 /* ─── MISSING NOTE ─── */
 .missing-note {
   background: rgba(227,179,65,0.08);
   border: 1px solid rgba(227,179,65,0.25);
   border-radius: 12px;
   padding: 12px 14px;
   font-size: 12px; color: var(--yellow);
   margin-top: 4px; line-height: 1.5;
 }

 /* ─── ИСТОРИЯ ─── */
 .history-stats {
   background: var(--card2);
   border: 1px solid var(--border);
   border-radius: 14px;
   padding: 14px;
   margin-bottom: 16px;
 }
 .history-stats-title {
   font-size: 11px; font-weight: 600;
   color: var(--text2);
   text-transform: uppercase; letter-spacing: 0.5px;
   margin-bottom: 10px;
 }
 .history-stats-grid {
   display: grid;
   grid-template-columns: repeat(3, 1fr);
   gap: 8px; text-align: center;
 }
 .h-val { font-size: 18px; font-weight: 800; color: var(--accent2); }
 .h-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

 /* ─── ПОРТФЕЛЬ ─── */
 .portfolio-header {
   display: flex; align-items: center; justify-content: space-between;
   margin-bottom: 16px;
 }
 .portfolio-title { font-size: 15px; font-weight: 800; color: var(--text); }
 .portfolio-count { font-size: 12px; color: var(--text2); margin-top: 2px; }
 .add-btn {
   display: flex; align-items: center; gap: 6px;
   background: rgba(63,185,80,0.12);
   border: 1px solid rgba(63,185,80,0.3);
   color: var(--accent);
   border-radius: 10px;
   padding: 8px 14px;
   font-size: 13px; font-weight: 700;
   cursor: pointer;
   -webkit-appearance: none;
 }
 .add-btn:active { transform: scale(0.95); }

 .p-bond-row {
   background: var(--card);
   border: 1px solid var(--border);
   border-radius: 14px;
   padding: 14px;
   margin-bottom: 8px;
   display: flex; align-items: center; gap: 12px;
 }
 .p-bond-info { flex: 1; min-width: 0; }
 .p-bond-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .p-bond-isin { font-size: 11px; color: var(--text2); font-family: monospace; margin-top: 2px; }
 .p-bond-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

 .qty-control {
   display: flex; align-items: center; gap: 0;
   background: var(--card2);
   border: 1px solid var(--border);
   border-radius: 8px;
   overflow: hidden;
 }
 .qty-btn {
   width: 32px; height: 32px;
   background: transparent;
   border: none;
   color: var(--text2);
   font-size: 18px;
   cursor: pointer;
   display: flex; align-items: center; justify-content: center;
   -webkit-appearance: none;
 }
 .qty-btn:active { background: var(--border); }
 .qty-input {
   width: 52px;
   background: transparent;
   border: none;
   color: var(--text);
   font-size: 14px; font-weight: 700;
   text-align: center;
   outline: none;
   padding: 0;
   -moz-appearance: textfield;
 }
 .qty-input::-webkit-outer-spin-button,
 .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }

 .del-btn {
   width: 32px; height: 32px;
   background: transparent;
   border: 1px solid rgba(247,129,102,0.25);
   border-radius: 8px;
   color: var(--accent2);
   font-size: 14px;
   cursor: pointer;
   display: flex; align-items: center; justify-content: center;
   -webkit-appearance: none;
 }
 .del-btn:active { background: rgba(247,129,102,0.1); }

 /* ─── МЕСЯЧНЫЙ ЗАГОЛОВОК ─── */
 .month-header {
   display: flex;
   align-items: center;
   justify-content: space-between;
   padding: 6px 4px 10px;
   margin-top: 8px;
 }
 .month-title {
   font-size: 13px;
   font-weight: 800;
   color: var(--text2);
   text-transform: uppercase;
   letter-spacing: 0.5px;
 }
 .month-sum {
   font-size: 13px;
   font-weight: 700;
   color: var(--accent3);
 }

 /* ─── АНАЛИТИКА ─── */
 .an-section { margin-bottom: 20px; }
 .an-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
 .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 8px; }
 .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
 .kpi-label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
 .kpi-val { font-size: 24px; font-weight: 800; line-height: 1; }
 .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
 .kpi-card.wide { grid-column: 1 / -1; }
 .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-bottom: 6px; }
 .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
 .bar-label { font-size: 9px; color: var(--text2); font-weight: 600; }
 .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
 .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
 .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
 .donut-wrap { display: flex; align-items: center; gap: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
 .donut-list { flex: 1; }
 .donut-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
 .donut-row:last-child { margin-bottom: 0; }
 .donut-name { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }
 .donut-pct { font-size: 13px; font-weight: 800; }
 .donut-sub { font-size: 11px; color: var(--text2); margin-top: 1px; text-align: right; }
 .ytm-table { width: 100%; border-collapse: collapse; }
 .ytm-table th { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
 .ytm-table td { padding: 10px 8px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
 .ytm-table tr:last-child td { border-bottom: none; }
 .ytm-name { font-weight: 700; font-size: 13px; }
 .ytm-isin { font-size: 10px; color: var(--text2); font-family: monospace; margin-top: 1px; }
 .ytm-pct { font-size: 14px; font-weight: 800; text-align: right; }
 .ytm-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; width: 60px; }
 .ytm-bar-fill { height: 100%; border-radius: 2px; }

 @keyframes fadeIn {
   from { opacity: 0; transform: translateY(10px); }
   to   { opacity: 1; transform: none; }
 }
</style>
</head>
<body>

<div class="topbar">
 <div class="topbar-row1">
   <div class="app-title">Купон<span>.</span>Календарь</div>
   <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">⟳</button>
 </div>
 <div class="tabs">
   <button class="tab-btn active" id="tab-calendar" onclick="switchTab('calendar')">📅 Календарь</button>
   <button class="tab-btn" id="tab-history" onclick="switchTab('history')">📜 История</button>
   <button class="tab-btn" id="tab-analytics" onclick="switchTab('analytics')">📊 Аналитика</button>
   <button class="tab-btn" id="tab-portfolio" onclick="switchTab('portfolio')">💼 Портфель</button>
 </div>
 <div id="pills-wrap">
   <div class="pills">
     <button class="pill active" id="pill-0t" onclick="setRange('today')">Сегодня</button>
     <button class="pill" id="pill-1"        onclick="setRange(1)">2 дня</button>
     <button class="pill" id="pill-7"        onclick="setRange(7)">7 дней</button>
     <button class="pill" id="pill-30"       onclick="setRange(30)">30 дней</button>
     <button class="pill" id="pill-90"       onclick="setRange(90)">3 месяца</button>
     <button class="pill" id="pill-0"        onclick="setRange(0)">Все</button>
   </div>
 </div>
</div>

<div class="status-strip">
 <div class="dot" id="dot"></div>
 <div id="statusText" style="flex:1">Загрузка данных...</div>
 <div class="progress" id="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="summary" id="summary">
 <div class="s-card"><div class="s-label">Сегодня</div><div class="s-val green" id="s-today">—</div></div>
 <div class="s-card"><div class="s-label">Неделя</div><div class="s-val orange" id="s-week">—</div></div>
 <div class="s-card"><div class="s-label">Месяц</div><div class="s-val blue" id="s-month">—</div></div>
 <div class="s-card"><div class="s-label">Бумаг</div><div class="s-val gray" id="s-total">18</div></div>
</div>

<div class="scroll-area" id="calendar">
 <div class="empty-state">
   <div class="empty-icon">📅</div>
   <div class="empty-title">Загрузка данных</div>
   <div class="empty-sub">Получаем актуальные даты купонов<br>с Московской биржи...</div>
 </div>
</div>

<div class="scroll-area" id="history" style="display:none">
 <div class="empty-state">
   <div class="empty-icon">📜</div>
   <div class="empty-title">Загрузка истории</div>
   <div class="empty-sub">Данные о прошедших выплатах...</div>
 </div>
</div>

<div class="scroll-area" id="analytics" style="display:none">
 <div id="analytics-content"></div>
</div>

<div class="scroll-area" id="portfolio" style="display:none">
 <div id="portfolio-content"></div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ БУМАГИ -->
<div id="add-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:flex-end;justify-content:center;" onclick="if(event.target===this)closeAddModal()">
 <div style="background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;border-top:1px solid var(--border);">
   <div style="font-size:16px;font-weight:800;margin-bottom:20px;">➕ Добавить бумагу</div>
   <div style="margin-bottom:14px;">
     <div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">ISIN</div>
     <input id="add-isin" placeholder="RU000A..." style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:monospace;outline:none;" oninput="this.value=this.value.toUpperCase()">
   </div>
   <div style="margin-bottom:14px;">
     <div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Количество штук</div>
     <input id="add-qty" type="number" placeholder="100" min="1" style="width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;">
   </div>
   <div id="add-found" style="display:none;background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--accent);"></div>
   <div id="add-err" style="display:none;background:rgba(247,129,102,0.08);border:1px solid rgba(247,129,102,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--accent2);"></div>
   <button onclick="confirmAdd()" style="width:100%;background:var(--accent);color:#0d1117;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;">Добавить</button>
   <button onclick="closeAddModal()" style="width:100%;background:var(--card2);color:var(--text2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;">Отмена</button>
 </div>
</div>

<script>

function fmtMoney(n) {
 if (n == null) return '—';
 return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPrc(valueprc, value, period, facevalue) {
 if (valueprc != null) return valueprc.toFixed(2) + '%';
 if (value != null && period && facevalue) {
   const annual = (value / facevalue) * (365 / period) * 100;
   return annual.toFixed(2) + '%*';
 }
 return '—';
}

// Для календаря: если у будущего купона нет ставки — берём из последнего прошедшего
function fmtPrcCalendar(data) {
 // Сначала пробуем данные следующего купона
 if (data.nextValueprc != null) return data.nextValueprc.toFixed(2) + '%';
 if (data.nextRate != null && data.nextPeriod && data.nextFace) {
   const annual = (data.nextRate / data.nextFace) * (365 / data.nextPeriod) * 100;
   return annual.toFixed(2) + '%*';
 }
 // Fallback: данные последнего прошедшего купона (для флоатеров у которых будущая ставка неизвестна)
 if (data.lastValueprc != null) return data.lastValueprc.toFixed(2) + '%~';
 if (data.lastRate != null && data.lastPeriod && data.lastFace) {
   const annual = (data.lastRate / data.lastFace) * (365 / data.lastPeriod) * 100;
   return annual.toFixed(2) + '%*~';
 }
 return '—';
}

// ─── ЗАГРУЗКА ДАННЫХ ───

async function resolveSecid(isin) {
 if (secidCache[isin]) return secidCache[isin];
 try {
   const res  = await fetch(`https://iss.moex.com/iss/securities.json?q=${isin}&iss.meta=off&limit=5`);
   const data = await res.json();
   const rows = data?.securities?.data || [];
   const cols = data?.securities?.columns || [];
   const iSecid = cols.indexOf('secid');
   const iIsin  = cols.indexOf('isin');
   const row    = rows.find(r => r[iIsin] === isin);
   const secid  = row ? row[iSecid] : isin;
   secidCache[isin] = secid;
   return secid;
 } catch { return isin; }
}

// Полная пагинация купонов по id (ISIN или тикер)
async function fetchAllCoupons(id) {
 let allRows = [], cols = null;
 let start = 0;
 const pageSize = 100;
 while (true) {
   try {
     const res  = await fetch(`https://iss.moex.com/iss/securities/${id}/bondization.json?iss.meta=off&limit=${pageSize}&start=${start}`, { signal: AbortSignal.timeout(10000) });
     const data = await res.json();
     const c    = data.coupons;
     if (!c || !c.data) break;
     if (!cols) cols = c.columns;
     allRows = allRows.concat(c.data);
     if (c.data.length < pageSize) break;
     start += pageSize;
     if (start > 3000) break;
   } catch { break; }
 }
 return { cols, rows: allRows };
}

async function fetchBond(bond) {
 const today = new Date(); today.setHours(0,0,0,0);
 const todayStr = today.toISOString().slice(0,10);

 let nextDate = null, nextRate = null, nextValueprc = null, nextPeriod = null, nextFace = null;
 let lastDate = null, lastRate = null, lastValueprc = null, lastPeriod = null, lastFace = null;

 // ── Шаг 1: bondization по ISIN (корпораты, муни) ──
 let { cols, rows } = await fetchAllCoupons(bond.isin);

 // Если пусто — пробуем по тикеру (ОФЗ)
 if (!rows.length) {
   const secid = await resolveSecid(bond.isin);
   if (secid !== bond.isin) {
     const r2 = await fetchAllCoupons(secid);
     cols = r2.cols; rows = r2.rows;
   }
 }

 if (cols && rows.length) {
   const iDate  = cols.indexOf('coupondate');
   const iVal   = cols.indexOf('value');
   const iPrc   = cols.indexOf('valueprc');
   const iStart = cols.indexOf('startdate');
   const iFace  = cols.indexOf('facevalue');

   // Разбиваем на прошедшие и будущие
   const past   = rows.filter(r => r[iDate] && r[iDate] <  todayStr);
   const future = rows.filter(r => r[iDate] && r[iDate] >= todayStr);

   // Последний прошедший купон
   if (past.length) {
     past.sort((a,b) => a[iDate] < b[iDate] ? 1 : -1);
     const lp = past[0];
     lastDate     = lp[iDate];
     lastRate     = lp[iVal];
     lastValueprc = lp[iPrc];
     lastFace     = lp[iFace] || 1000;
     if (lp[iStart] && lp[iDate]) {
       lastPeriod = Math.round((new Date(lp[iDate]) - new Date(lp[iStart])) / 86400000);
     }
   }

   // Ближайший будущий купон
   if (future.length) {
     future.sort((a,b) => a[iDate] > b[iDate] ? 1 : -1);
     const nf = future[0];
     nextDate     = nf[iDate];
     nextRate     = nf[iVal];
     nextValueprc = nf[iPrc];
     nextFace     = nf[iFace] || 1000;
     if (nf[iStart] && nf[iDate]) {
       nextPeriod = Math.round((new Date(nf[iDate]) - new Date(nf[iStart])) / 86400000);
     }
   }
 }

 // ── Шаг 2: marketdata — NEXTCOUPON fallback + реальный YTM от биржи ──
 // Для корпоратов: запрос по ISIN на TQCB
 // Для ОФЗ: запрос по тикеру SU* на TQOB (ISIN не работает!)
 let moexYtm   = null;
 let moexPrice = null;

 // Определяем secid (для ОФЗ он уже мог быть получён выше)
 const secidForMarket = bond.type === 'ofz'
   ? (await resolveSecid(bond.isin))  // SU29010RMFS4 и т.д.
   : bond.isin;

 const board = bond.type === 'ofz' ? 'TQOB' : 'TQCB';

 try {
   const url  = `https://iss.moex.com/iss/engines/stock/markets/bonds/boards/${board}/securities/${secidForMarket}.json?iss.meta=off&iss.only=securities,marketdata`;
   const res  = await fetch(url, { signal: AbortSignal.timeout(8000) });
   const data = await res.json();

   if (data.securities?.data?.length) {
     const c   = data.securities.columns;
     const row = data.securities.data[0];
     const get = k => row[c.indexOf(k)];
     if (!nextDate) {
       nextDate = get('NEXTCOUPON');
       if (!nextRate) nextRate = get('COUPONVALUE') || null;
       nextValueprc = get('COUPONPERCENT');
       nextPeriod   = get('COUPONPERIOD');
       nextFace     = 1000;
     }
     moexPrice = get('PREVLEGALCLOSEPRICE') || get('PREVWAPRICE');
     // YTM прямо из securities (надёжнее чем из marketdata)
     const y = get('YIELDATPREVWAPRICE');
     if (y != null && y > 0) moexYtm = y;
   }

   // Дополнительно из marketdata если securities не дал YTM
   if (!moexYtm && data.marketdata?.data?.length) {
     const mc   = data.marketdata.columns;
     const mrow = data.marketdata.data[0];
     const mget = k => mrow[mc.indexOf(k)];
     const y1 = mget('YIELDATPREVWAPRICE');
     const y2 = mget('YIELDATWAPRICE');
     if (y1 != null && y1 > 0) moexYtm = y1;
     else if (y2 != null && y2 > 0) moexYtm = y2;
   }
 } catch {}

 // Для ОФЗ без явного типа — пробуем ещё раз по ISIN на общем эндпоинте
 if (!moexYtm && bond.type !== 'ofz') {
   try {
     const url2 = `https://iss.moex.com/iss/engines/stock/markets/bonds/securities/${bond.isin}.json?iss.meta=off&iss.only=securities`;
     const res2 = await fetch(url2, { signal: AbortSignal.timeout(6000) });
     const data2 = await res2.json();
     if (data2.securities?.data?.length) {
       const c2  = data2.securities.columns;
       const row2 = data2.securities.data[0];
       const y = row2[c2.indexOf('YIELDATPREVWAPRICE')];
       if (y != null && y > 0) moexYtm = y;
       if (!moexPrice) moexPrice = row2[c2.indexOf('PREVLEGALCLOSEPRICE')];
     }
   } catch {}
 }

 // Флоатер: YTM = 0 и нет фиксированного купонного % — биржа не считает YTM
 // Определяем по couponpercent=null и ytm=0
 const isFloater = !moexYtm && bond.type === 'ofz' &&
   (nextValueprc == null || nextValueprc === 0) &&
   (lastValueprc == null || lastValueprc === 0);

 return { nextDate, nextRate, nextValueprc, nextPeriod, nextFace, lastDate, lastRate, lastValueprc, lastPeriod, lastFace, moexYtm, moexPrice, isFloater };
}

// ─── КЭШ ДАННЫХ ───
const CACHE_KEY = 'coupon_cache_v2';
const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 часов

function saveCache() {
 try {
   localStorage.setItem(CACHE_KEY, JSON.stringify({
     ts: Date.now(),
     data: couponData,
     rates: bonds.map(b => ({ isin: b.isin, rate: b.rate }))
   }));
 } catch(e) { console.warn('cache save failed', e); }
}

function loadCache() {
 try {
   const raw = localStorage.getItem(CACHE_KEY);
   if (!raw) return false;
   const { ts, data, rates } = JSON.parse(raw);
   if (Date.now() - ts > CACHE_TTL) return false;
   // Восстанавливаем couponData
   Object.assign(couponData, data);
   // Восстанавливаем rate
   if (rates) rates.forEach(r => {
     const b = bonds.find(x => x.isin === r.isin);
     if (b && r.rate) b.rate = r.rate;
   });
   return true;
 } catch(e) { return false; }
}

// ─── ОЧЕРЕДЬ ЗАПРОСОВ (макс. 5 параллельных) ───
async function pLimit(tasks, concurrency = 5) {
 const results = new Array(tasks.length);
 let idx = 0;
 async function worker() {
   while (idx < tasks.length) {
     const i = idx++;
     results[i] = await tasks[i]();
   }
 }
 const workers = Array.from({ length: Math.min(concurrency, tasks.length) }, worker);
 await Promise.all(workers);
 return results;
}

   updateSummary();
   render();
   if (currentTab === 'history')   renderHistory();
   if (currentTab === 'analytics') renderAnalytics();
   if (currentTab === 'portfolio') renderPortfolio();
 } else {
   setStatus('loading', 'Загрузка данных с Мосбиржи...', 0);
 }

 let done = 0;
 const tasks = bonds.map(bond => async () => {
   const d = await fetchBond(bond);
   couponData[bond.isin] = d;
   if (d.nextRate != null) bond.rate = d.nextRate;
   done++;
   setStatus('loading', `Загружено ${done} из ${bonds.length}...`, Math.round(done / bonds.length * 100));
 });

 await pLimit(tasks, 5);

 saveCache();
 checkUpcomingCoupons(); // PWA уведомления

 const loaded = bonds.filter(b => couponData[b.isin]?.nextDate).length;
 const time   = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
 setStatus('ok', `Обновлено в ${time} · ${loaded}/${bonds.length} бумаг`);
 btn.classList.remove('spinning');
 isLoading = false;

 updateSummary();
 render();
 if (currentTab === 'history')   renderHistory();
 if (currentTab === 'analytics') renderAnalytics();
 if (currentTab === 'portfolio') renderPortfolio();
}

// ─── SUMMARY ───

function updateSummary() {
 const today = new Date(); today.setHours(0,0,0,0);
 let t = 0, w = 0, m = 0;
 bonds.forEach(b => {
   const nc = couponData[b.isin]?.nextDate;
   if (!nc) return;
   const [y,mo,dy] = nc.split('-').map(Number);
   const d    = new Date(y, mo-1, dy);
   const diff = Math.round((d - today) / 86400000);
   if (diff === 0)             t++;
   if (diff >= 0 && diff <= 7) w++;
   if (diff >= 0 && diff <= 30) m++;
 });
 document.getElementById('s-today').textContent = t;
 document.getElementById('s-week').textContent  = w;
 document.getElementById('s-month').textContent = m;
 document.getElementById('s-total').textContent = bonds.length;
}

// ─── РЕНДЕР КАЛЕНДАРЯ ───

function render() {
 const cal   = document.getElementById('calendar');
 const today = new Date(); today.setHours(0,0,0,0);

 let items = bonds.map(b => {
   const d = couponData[b.isin];
   if (!d?.nextDate) return null;
   const [y,mo,dy] = d.nextDate.split('-').map(Number);
   const dt   = new Date(y, mo-1, dy);
   const diff = Math.round((dt - today) / 86400000);
   if (diff < 0) return null;
   return { bond: b, date: dt, diff, data: d };
 }).filter(Boolean);

 if (currentRange === 'today') items = items.filter(x => x.diff === 0);
 else if (currentRange > 0)   items = items.filter(x => x.diff <= currentRange);
 items.sort((a,b) => a.date - b.date);

 if (items.length === 0) {
   const hasAny = bonds.some(b => couponData[b.isin]?.nextDate);
   cal.innerHTML = `<div class="empty-state">
     <div class="empty-icon">${hasAny ? '📭' : '🔄'}</div>
     <div class="empty-title">${hasAny ? 'Выплат нет' : 'Нет данных'}</div>
     <div class="empty-sub">${hasAny ? 'В выбранном периоде нет купонных выплат.<br>Попробуйте расширить диапазон.' : 'Нажмите ⟳ для загрузки данных с Мосбиржи.'}</div>
   </div>`;
   return;
 }

 // Группируем по дате
 const dayGroups = {};
 items.forEach(item => {
   const key = item.date.toISOString().slice(0,10);
   if (!dayGroups[key]) dayGroups[key] = { date: item.date, diff: item.diff, items: [], sum: 0 };
   const rate = item.data.nextRate ?? item.bond.rate;
   dayGroups[key].items.push({ ...item, rate });
   dayGroups[key].sum += (rate || 0) * item.bond.qty;
 });

 // Группируем по месяцам
 const monthGroups = {};
 Object.values(dayGroups).forEach(dg => {
   const mk = `${dg.date.getFullYear()}-${String(dg.date.getMonth()+1).padStart(2,'0')}`;
   if (!monthGroups[mk]) monthGroups[mk] = { year: dg.date.getFullYear(), month: dg.date.getMonth(), days: [], sum: 0 };
   monthGroups[mk].days.push(dg);
   monthGroups[mk].sum += dg.sum;
 });

 const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

 let html = '';
 let gi = 0;
 Object.entries(monthGroups).sort(([a],[b]) => a.localeCompare(b)).forEach(([mk, mg]) => {
   // Месячный заголовок
   html += `<div class="month-header">
     <div class="month-title">${monthNames[mg.month]} ${mg.year}</div>
     <div class="month-sum">${Math.round(mg.sum).toLocaleString('ru-RU')} ₽</div>
   </div>`;

   mg.days.sort((a,b) => a.date - b.date).forEach(group => {
     const isToday  = group.diff === 0;
     const d        = group.date;
     const diffText = isToday ? 'сегодня' : group.diff === 1 ? 'завтра' : `через ${group.diff} дн.`;
     html += `<div class="day-group ${isToday ? 'is-today' : ''}" style="animation:fadeIn 0.25s ${gi*40}ms both">
       <div class="day-header">
         <div class="day-badge">
           <div class="day-num">${d.getDate()}</div>
           <div class="day-wday">${wdays[d.getDay()]}</div>
         </div>
         <div class="day-meta">
           <div class="day-full">${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}</div>
           <div class="day-diff">${diffText}</div>
         </div>
         <div class="day-count-badge">${group.items.length} выпл. · ${Math.round(group.sum).toLocaleString('ru-RU')} ₽</div>
       </div>`;
     group.items.forEach(({ bond, rate, data }) => {
       const typeLabel = bond.type === 'ofz' ? 'ОФЗ' : bond.type === 'muni' ? 'МО' : 'КО';
       const total     = (rate || 0) * bond.qty;
       const prcStr    = fmtPrcCalendar(data);
       html += `<div class="bond-row">
         <div class="type-badge type-${bond.type}">${typeLabel}</div>
         <div class="bond-info">
           <div class="bond-name">${bond.name}</div>
           <div class="bond-meta">
             <span class="bond-qty">${bond.qty} шт</span>
             <span>${fmtMoney(rate)} ₽/шт</span>
             <span class="bond-prc">${prcStr}</span>
           </div>
         </div>
         <div class="bond-right">
           <div class="coupon-total">${Math.round(total).toLocaleString('ru-RU')} ₽</div>
           <div class="coupon-per">итого выплата</div>
         </div>
       </div>`;
     });
     html += `</div>`;
     gi++;
   });
 });

 const missing = bonds.filter(b => !couponData[b.isin]?.nextDate);
 if (missing.length > 0 && bonds.some(b => couponData[b.isin]?.nextDate)) {
   html += `<div class="missing-note">⚠ Нет даты купона для ${missing.length} бумаги: ${missing.map(b=>b.name).join(', ')}</div>`;
 }

 cal.innerHTML = html;
}

// ─── РЕНДЕР ИСТОРИИ ───
// Показывает последний прошедший купон по каждой бумаге, в хронологическом порядке (свежие сверху)

function renderHistory() {
 const hist  = document.getElementById('history');
 const today = new Date(); today.setHours(0,0,0,0);

 const items = [];
 let totalSum = 0;

 bonds.forEach(b => {
   const d = couponData[b.isin];
   if (!d?.lastDate) return;
   const [y,mo,dy] = d.lastDate.split('-').map(Number);
   const dt    = new Date(y, mo-1, dy);
   const diff  = Math.round((dt - today) / 86400000); // отрицательное
   const rate  = d.lastRate ?? b.rate;
   const total = (rate || 0) * b.qty;
   totalSum += total;
   items.push({ bond: b, date: dt, diff, rate, data: d });
 });

 if (items.length === 0) {
   hist.innerHTML = `<div class="empty-state">
     <div class="empty-icon">📜</div>
     <div class="empty-title">Нет данных</div>
     <div class="empty-sub">Данные о прошедших выплатах<br>появятся после загрузки.</div>
   </div>`;
   return;
 }

 // Сортировка: свежие сверху
 items.sort((a,b) => b.date - a.date);

 const uniqueBonds = new Set(items.map(i => i.bond.isin)).size;
 let html = `<div class="history-stats">
   <div class="history-stats-title">📊 Последние выплаты по портфелю</div>
   <div class="history-stats-grid">
     <div><div class="h-val">${items.length}</div><div class="h-label">бумаг</div></div>
     <div><div class="h-val">${Math.round(totalSum).toLocaleString('ru-RU')} ₽</div><div class="h-label">суммарно</div></div>
     <div><div class="h-val">${uniqueBonds}</div><div class="h-label">уникальных</div></div>
   </div>
 </div>`;

 // Группируем по дате выплаты
 const groups = {};
 items.forEach(item => {
   const key = item.date.toISOString().slice(0,10);
   if (!groups[key]) groups[key] = { date: item.date, diff: item.diff, items: [], sum: 0 };
   groups[key].items.push(item);
   groups[key].sum += item.rate * item.bond.qty;
 });

 Object.values(groups).sort((a,b) => b.date - a.date).forEach((group, gi) => {
   const d        = group.date;
   const diffAbs  = Math.abs(group.diff);
   const diffText = group.diff === 0 ? 'сегодня' :
                    group.diff === -1 ? 'вчера' :
                    `${diffAbs} дн. назад`;

   html += `<div class="day-group is-past" style="animation:fadeIn 0.25s ${gi*40}ms both">
     <div class="day-header">
       <div class="day-badge">
         <div class="day-num">${d.getDate()}</div>
         <div class="day-wday">${wdays[d.getDay()]}</div>
       </div>
       <div class="day-meta">
         <div class="day-full">${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}</div>
         <div class="day-diff">✓ ${diffText}</div>
       </div>
       <div class="day-count-badge">${group.items.length} выпл. · ${Math.round(group.sum).toLocaleString('ru-RU')} ₽</div>
     </div>`;

   group.items.forEach(({ bond, rate, data }) => {
     const typeLabel = bond.type === 'ofz' ? 'ОФЗ' : bond.type === 'muni' ? 'МО' : 'КО';
     const total     = (rate || 0) * bond.qty;
     const prcStr    = fmtPrc(data.lastValueprc, data.lastRate, data.lastPeriod, data.lastFace);
     html += `<div class="bond-row bond-past">
       <div class="type-badge type-${bond.type}">${typeLabel}</div>
       <div class="bond-info">
         <div class="bond-name">${bond.name}</div>
         <div class="bond-meta">
           <span class="bond-qty">${bond.qty} шт</span>
           <span>${fmtMoney(rate)} ₽/шт</span>
           <span class="bond-prc">${prcStr}</span>
         </div>
       </div>
       <div class="bond-right">
         <div class="coupon-total past">${Math.round(total).toLocaleString('ru-RU')} ₽</div>
         <div class="coupon-per">выплачено</div>
       </div>
     </div>`;
   });
   html += `</div>`;
 });

 hist.innerHTML = html;
}
// ─── АНАЛИТИКА ───

function renderAnalytics() {
 const el    = document.getElementById('analytics-content');
 if (!el) return;
 const today = new Date(); today.setHours(0,0,0,0);

 // Если данные ещё не загружены — показываем заглушку
 const loaded = bonds.filter(b => couponData[b.isin]?.lastDate || couponData[b.isin]?.nextDate).length;
 if (loaded === 0) {
   el.innerHTML = `<div class="empty-state">
     <div class="empty-icon">📊</div>
     <div class="empty-title">Данные загружаются</div>
     <div class="empty-sub">Аналитика появится после загрузки купонов.<br>Нажмите ⟳ если данные не появились.</div>
   </div>`;
   return;
 }

 const monthsRu   = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
 const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

 // ── Будущие купоны по месяцам (12 мес) ──
 // Используем nextDate + nextRate (или lastRate как fallback — как в renderHistory)
 const monthData = {};
 for (let i = 0; i < 12; i++) {
   const d  = new Date(today.getFullYear(), today.getMonth() + i, 1);
   const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
   monthData[mk] = { ofz:0, corp:0, muni:0, total:0, label: monthsRu[d.getMonth()] };
 }

 bonds.forEach(b => {
   const d = couponData[b.isin];
   if (!d?.nextDate) return;
   // rate: следующий купон если известен, иначе последний прошедший (как в renderHistory)
   const rate   = (d.nextRate != null && d.nextRate > 0) ? d.nextRate : (d.lastRate ?? b.rate);
   const period = d.nextPeriod ?? d.lastPeriod ?? 182;
   const total  = (rate || 0) * b.qty;
   if (!total) return;

   let dt = new Date(d.nextDate);
   const limit = new Date(today.getFullYear(), today.getMonth() + 12, 31);
   while (dt <= limit) {
     if (dt >= today) {
       const mk = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
       if (monthData[mk]) {
         monthData[mk][b.type] += total;
         monthData[mk].total   += total;
       }
     }
     dt = new Date(dt.getTime() + period * 86400000);
   }
 });

 const monthKeys = Object.keys(monthData).sort();
 const maxMonth  = Math.max(...monthKeys.map(k => monthData[k].total), 1);
 const yearTotal = monthKeys.reduce((s, k) => s + monthData[k].total, 0);

 // ── Распределение по типам — используем lastRate как в renderHistory ──
 let typeOfz = 0, typeCorp = 0, typeMuni = 0;
 bonds.forEach(b => {
   const d    = couponData[b.isin];
   // Точно как в renderHistory: d.lastRate ?? b.rate
   const rate = d?.lastRate ?? b.rate;
   const val  = (rate || 0) * b.qty;
   if (b.type === 'ofz')  typeOfz  += val;
   if (b.type === 'corp') typeCorp += val;
   if (b.type === 'muni') typeMuni += val;
 });
 const typeTotal = typeOfz + typeCorp + typeMuni || 1;
 const pOfz  = typeOfz  / typeTotal;
 const pCorp = typeCorp / typeTotal;
 const pMuni = typeMuni / typeTotal;

 // ── YTM: приоритет — реальный YTM от биржи (YIELDATPREVWAPRICE) ──
 const ytmRows = bonds.map(b => {
   const d = couponData[b.isin];

   // 1. Реальный YTM от биржи
   if (d?.moexYtm != null && d.moexYtm > 0) {
     return { bond: b, ytm: d.moexYtm, isReal: true, isFloater: false, price: d.moexPrice };
   }

   // 2. Флоатер — YTM биржей не считается, показываем купонную ставку с пометкой
   if (d?.isFloater) {
     const value  = d?.lastRate ?? b.rate;
     const period = d?.lastPeriod ?? d?.nextPeriod;
     const face   = d?.lastFace ?? 1000;
     let ytm = null;
     if (value > 0 && period > 0) ytm = (value / face) * (365 / period) * 100;
     else if (value > 0) ytm = (value / face) * 100;
     return { bond: b, ytm, isReal: false, isFloater: true, price: d?.moexPrice };
   }

   // 3. Fallback: купонная ставка из lastRate
   const valueprc = d?.lastValueprc;
   const value    = d?.lastRate ?? b.rate;
   const period   = d?.lastPeriod ?? d?.nextPeriod;
   const face     = d?.lastFace ?? d?.nextFace ?? 1000;

   let ytm = null;
   if (valueprc != null && valueprc > 0) ytm = valueprc;
   else if (value != null && value > 0 && period > 0) ytm = (value / face) * (365 / period) * 100;
   else if (value != null && value > 0) ytm = (value / face) * 100;
   return { bond: b, ytm, isReal: false, isFloater: false, price: null };
 }).filter(x => x.ytm != null && x.ytm > 0).sort((a,b) => b.ytm - a.ytm);

 // Средневзвешенная YTM — взвешиваем по номиналу позиции
 let wSum = 0, wYtm = 0;
 const realCount = ytmRows.filter(x => x.isReal).length;
 ytmRows.forEach(({ bond, ytm, isReal, isFloater }) => {
   if (isFloater) return; // флоатеры исключаем — нестабильная ставка
   if (realCount > 0 && !isReal) return; // если есть реальные YTM — считаем только по ним
   const face = couponData[bond.isin]?.lastFace ?? 1000;
   const weight = bond.qty * face;
   wSum += weight;
   wYtm += ytm * weight;
 });
 const avgYtm = wSum > 0 ? wYtm / wSum : 0;
 const avgLabel = realCount > 0 ? `по ${realCount} бумагам с рыночной ценой` : 'купонная доходность к номиналу';
 const totalFaceValue = bonds.reduce((s,b) => s + b.qty * (couponData[b.isin]?.lastFace ?? 1000), 0);

 // ── SVG ПОНЧИК ──
 function donutPath(pct, startPct, color, r=42, cx=52, cy=52) {
   const circ = 2 * Math.PI * r;
   const dash = pct * circ;
   const off  = (1 - startPct) * circ;
   return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}"
     stroke-width="18" stroke-dasharray="${dash} ${circ-dash}"
     stroke-dashoffset="${off}" transform="rotate(-90 ${cx} ${cy})"/>`;
 }
 const svgDonut = `<svg width="104" height="104" viewBox="0 0 104 104">
   <circle cx="52" cy="52" r="42" fill="none" stroke="var(--border)" stroke-width="18"/>
   ${donutPath(pOfz, 0, '#bc8cff')}
   ${donutPath(pCorp, pOfz, '#3fb950')}
   ${donutPath(pMuni, pOfz+pCorp, '#f78166')}
   <text x="52" y="48" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="800" font-family="Inter,-apple-system,sans-serif">${bonds.length}</text>
   <text x="52" y="62" text-anchor="middle" fill="var(--text2)" font-size="9" font-family="Inter,-apple-system,sans-serif">бумаг</text>
 </svg>`;

 let html = '';

 // KPI
 html += `<div class="an-section">
   <div class="an-title">📈 Доходность портфеля</div>
   <div class="kpi-grid">
     <div class="kpi-card">
       <div class="kpi-label">Средняя YTM</div>
       <div class="kpi-val" style="color:var(--accent)">${avgYtm.toFixed(2)}%</div>
       <div class="kpi-sub">взвешенная по номиналу</div>
     </div>
     <div class="kpi-card">
       <div class="kpi-label">За 12 месяцев</div>
       <div class="kpi-val" style="color:var(--accent3)">${Math.round(yearTotal).toLocaleString('ru-RU')} ₽</div>
       <div class="kpi-sub">ожидаемые купоны</div>
     </div>
     <div class="kpi-card">
       <div class="kpi-label">Номинал портфеля</div>
       <div class="kpi-val" style="color:var(--purple)">${Math.round(totalFaceValue/1000).toLocaleString('ru-RU')} К ₽</div>
       <div class="kpi-sub">${bonds.length} бумаг · ${bonds.reduce((s,b)=>s+b.qty,0).toLocaleString('ru-RU')} шт</div>
     </div>
     <div class="kpi-card">
       <div class="kpi-label">Купон / мес (ср.)</div>
       <div class="kpi-val" style="color:var(--yellow)">${Math.round(yearTotal/12).toLocaleString('ru-RU')} ₽</div>
       <div class="kpi-sub">среднемесячный доход</div>
     </div>
   </div>
 </div>`;

 // Бар-чарт
 html += `<div class="an-section">
   <div class="an-title">📅 Ожидаемые выплаты — 12 месяцев</div>
   <div class="kpi-card" style="padding:16px 12px 12px;">
     <div class="bar-chart">`;
 monthKeys.forEach(mk => {
   const m   = monthData[mk];
   const pct = m.total / maxMonth;
   const h   = Math.max(Math.round(pct * 88), m.total > 0 ? 4 : 0);
   const clr = m.ofz > m.corp && m.ofz > m.muni ? '#bc8cff' : m.corp > m.muni ? '#3fb950' : '#f78166';
   html += `<div class="bar-wrap">
     <div style="font-size:9px;color:var(--text2);font-weight:700;margin-bottom:2px;">${m.total>0?Math.round(m.total/1000)+'К':''}</div>
     <div style="flex:1;display:flex;align-items:flex-end;width:100%;">
       <div style="height:${h}px;width:100%;border-radius:4px 4px 0 0;background:${clr};opacity:${m.total>0?1:0.15};"></div>
     </div>
     <div class="bar-label">${m.label}</div>
   </div>`;
 });
 html += `</div>
     <div class="legend">
       <div class="legend-item"><div class="legend-dot" style="background:#bc8cff"></div>ОФЗ</div>
       <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>Корпораты</div>
       <div class="legend-item"><div class="legend-dot" style="background:#f78166"></div>Муни</div>
     </div>
   </div>
 </div>`;

 // Пончик
 html += `<div class="an-section">
   <div class="an-title">🥧 Распределение по типам</div>
   <div class="donut-wrap">
     ${svgDonut}
     <div class="donut-list">
       <div class="donut-row">
         <div class="donut-name"><div class="legend-dot" style="background:#bc8cff"></div>ОФЗ</div>
         <div><div class="donut-pct" style="color:#bc8cff">${(pOfz*100).toFixed(1)}%</div><div class="donut-sub">${Math.round(typeOfz).toLocaleString('ru-RU')} ₽</div></div>
       </div>
       <div class="donut-row">
         <div class="donut-name"><div class="legend-dot" style="background:#3fb950"></div>Корпораты</div>
         <div><div class="donut-pct" style="color:#3fb950">${(pCorp*100).toFixed(1)}%</div><div class="donut-sub">${Math.round(typeCorp).toLocaleString('ru-RU')} ₽</div></div>
       </div>
       <div class="donut-row">
         <div class="donut-name"><div class="legend-dot" style="background:#f78166"></div>Муни</div>
         <div><div class="donut-pct" style="color:#f78166">${(pMuni*100).toFixed(1)}%</div><div class="donut-sub">${Math.round(typeMuni).toLocaleString('ru-RU')} ₽</div></div>
       </div>
     </div>
   </div>
 </div>`;

 // YTM таблица
 if (ytmRows.length === 0) {
   html += `<div class="an-section"><div class="an-title">📋 YTM по бумагам</div>
     <div class="kpi-card"><div style="color:var(--text2);font-size:13px;text-align:center;padding:8px;">Нет данных о доходности. Обновите данные кнопкой ⟳</div></div></div>`;
 } else {
 html += `<div class="an-section">
   <div class="an-title">📋 YTM по бумагам</div>
   <div class="kpi-card" style="padding:0 4px;">
     <table class="ytm-table">
       <thead><tr>
         <th>Бумага</th>
         <th></th>
         <th style="text-align:right">YTM</th>
       </tr></thead><tbody>`;

 const maxYtm = ytmRows[0]?.ytm || 1;
 ytmRows.forEach(({ bond, ytm, isReal, isFloater, price }) => {
   const clr   = bond.type==='ofz' ? '#bc8cff' : bond.type==='muni' ? '#f78166' : '#3fb950';
   const lbl   = bond.type==='ofz' ? 'ОФЗ' : bond.type==='muni' ? 'МО' : 'КО';
   const barW  = Math.round(ytm / maxYtm * 100);
   const priceStr  = isReal && price ? `цена ${price.toFixed(2)}%` : '';
   const subLabel  = isReal ? priceStr : isFloater ? 'флоатер · купонная ставка' : 'купонная ставка к номиналу';
   const ytmLabel  = isReal ? ytm.toFixed(2)+'%' : isFloater ? ytm.toFixed(2)+'%~' : ytm.toFixed(2)+'%*';
   html += `<tr>
     <td>
       <div class="ytm-name">${bond.name}</div>
       <div class="ytm-isin" style="color:${clr}">${lbl} · ${subLabel}</div>
     </td>
     <td><div class="ytm-bar-bg"><div class="ytm-bar-fill" style="width:${barW}%;background:${clr}"></div></div></td>
     <td class="ytm-pct" style="color:${clr}">${ytmLabel}</td>
   </tr>`;
 });
 html += `</tbody></table></div></div>`;
 } // end if ytmRows.length

 // Итого YTM
 html += `<div class="kpi-card wide" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin-bottom:20px;">
   <div>
     <div class="kpi-label">Средневзвешенная YTM портфеля</div>
     <div style="font-size:11px;color:var(--text2);margin-top:2px;">${avgLabel}</div>
   </div>
   <div style="font-size:28px;font-weight:800;color:var(--accent)">${avgYtm.toFixed(2)}%</div>
 </div>

 <div style="font-size:11px;color:var(--text3);padding:0 4px 8px;line-height:1.5;">
   Без знака — реальный YTM от Мосбиржи (рыночная цена + срок до погашения)<br>
   ~ — флоатер: ставка купона меняется, YTM биржей не рассчитывается<br>
   * — расчётная купонная доходность к номиналу (нет данных от биржи)
 </div>`;

 el.innerHTML = html;
}

function switchTab(tab) {
 currentTab = tab;
 document.getElementById('calendar').style.display   = tab === 'calendar'  ? '' : 'none';
 document.getElementById('history').style.display    = tab === 'history'   ? '' : 'none';
 document.getElementById('analytics').style.display  = tab === 'analytics' ? '' : 'none';
 document.getElementById('portfolio').style.display  = tab === 'portfolio' ? '' : 'none';
 document.getElementById('pills-wrap').style.display = tab === 'calendar'  ? '' : 'none';

 document.getElementById('tab-calendar').classList.toggle('active',  tab === 'calendar');

// ─── ПОРТФЕЛЬ: РЕНДЕР ───

function renderPortfolio() {
 const el = document.getElementById('portfolio-content');
 const typeLabel = t => t === 'ofz' ? 'ОФЗ' : t === 'muni' ? 'МО' : 'КО';

 let html = `<div class="portfolio-header">
   <div>
     <div class="portfolio-title">💼 Мой портфель</div>
     <div class="portfolio-count">${bonds.length} бумаг</div>
   </div>
   <button class="add-btn" onclick="openAddModal()">＋ Добавить</button>
 </div>`;

 bonds.forEach((b, idx) => {
   html += `<div class="p-bond-row" id="pbond-${idx}">
     <div class="type-badge type-${b.type}">${typeLabel(b.type)}</div>
     <div class="p-bond-info">
       <div class="p-bond-name">${b.name}</div>
       <div class="p-bond-isin">${b.isin}</div>
     </div>
     <div class="p-bond-right">
       <div class="qty-control">
         <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
         <input class="qty-input" type="number" value="${b.qty}" min="1"
           onchange="setQty(${idx}, this.value)"
           onblur="setQty(${idx}, this.value)">
         <button class="qty-btn" onclick="changeQty(${idx}, 1)">＋</button>
       </div>
       <button class="del-btn" onclick="deleteBond(${idx})" title="Удалить">✕</button>
     </div>
   </div>`;
 });

 el.innerHTML = html;
}

function changeQty(idx, delta) {
 const newQty = Math.max(1, (bonds[idx].qty || 1) + delta);
 bonds[idx].qty = newQty;
 savePortfolio();
 renderPortfolio();
}

function setQty(idx, val) {
 const n = parseInt(val);
 if (!isNaN(n) && n > 0) {
   bonds[idx].qty = n;
   savePortfolio();
 }
}

function deleteBond(idx) {
 const b = bonds[idx];
 if (!confirm(`Удалить «${b.name}» из портфеля?`)) return;
 bonds.splice(idx, 1);
 delete couponData[b.isin];
 savePortfolio();
 renderPortfolio();
 updateSummary();
 render();
}

// ─── ПОРТФЕЛЬ: МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ───

function openAddModal() {
 const m = document.getElementById('add-modal');
 m.style.display = 'flex';
 m.style.alignItems = 'flex-end';
 m.style.justifyContent = 'center';
 document.getElementById('add-isin').value = '';
 document.getElementById('add-qty').value = '';
 document.getElementById('add-found').style.display = 'none';
 document.getElementById('add-err').style.display = 'none';
 setTimeout(() => document.getElementById('add-isin').focus(), 100);
}

function closeAddModal() {
 document.getElementById('add-modal').style.display = 'none';
}

async function confirmAdd() {
 const isin = document.getElementById('add-isin').value.trim().toUpperCase();
 const qty  = parseInt(document.getElementById('add-qty').value);
 const errEl   = document.getElementById('add-err');
 const foundEl = document.getElementById('add-found');

 errEl.style.display = 'none';
 foundEl.style.display = 'none';

 if (!/^RU[A-Z0-9]{10}$/.test(isin)) {
   errEl.textContent = 'Введите корректный ISIN (RU + 10 символов)';
   errEl.style.display = 'block'; return;
 }
 if (!qty || qty < 1) {
   errEl.textContent = 'Введите количество штук (минимум 1)';
   errEl.style.display = 'block'; return;
 }
 if (bonds.find(b => b.isin === isin)) {
   errEl.textContent = 'Эта бумага уже есть в портфеле';
   errEl.style.display = 'block'; return;
 }

 // Ищем бумагу на MOEX
 foundEl.textContent = '⏳ Поиск на Мосбирже...';
 foundEl.style.display = 'block';
 foundEl.style.color = 'var(--yellow)';
 foundEl.style.borderColor = 'rgba(227,179,65,0.25)';
 foundEl.style.background = 'rgba(227,179,65,0.08)';

 try {
   const res  = await fetch(`https://iss.moex.com/iss/securities.json?q=${isin}&iss.meta=off&limit=5`);
   const data = await res.json();
   const rows = data?.securities?.data || [];
   const cols = data?.securities?.columns || [];
   const iIsin  = cols.indexOf('isin');
   const iName  = cols.indexOf('shortname');
   const iType  = cols.indexOf('type');
   const iGroup = cols.indexOf('group');
   const row = rows.find(r => r[iIsin] === isin);

   if (!row) {
     foundEl.textContent = '❌ Бумага не найдена на Мосбирже';
     foundEl.style.color = 'var(--accent2)';
     foundEl.style.borderColor = 'rgba(247,129,102,0.25)';
     foundEl.style.background = 'rgba(247,129,102,0.08)';
     return;
   }

   const name  = row[iName] || isin;
   const group = row[iGroup] || '';
   const type  = group.includes('ofz') ? 'ofz' : group.includes('muni') || group.includes('subfederal') ? 'muni' : 'corp';

   foundEl.textContent = `✓ Найдено: ${name} (${type.toUpperCase()})`;
   foundEl.style.color = 'var(--accent)';
   foundEl.style.borderColor = 'rgba(63,185,80,0.25)';
   foundEl.style.background = 'rgba(63,185,80,0.08)';

   // Добавляем в портфель
   const newBond = { isin, name, type, qty, rate: 0 };
   bonds.push(newBond);
   savePortfolio();

   closeAddModal();
   renderPortfolio();

   // Загружаем данные по новой бумаге
   setStatus('loading', `Загрузка данных для ${name}...`);
   const d = await fetchBond(newBond);
   couponData[isin] = d;
   if (d.nextRate != null) newBond.rate = d.nextRate;
   savePortfolio();
   setStatus('ok', `Добавлено: ${name}`);
   updateSummary();
   render();
   renderPortfolio();

 } catch(e) {
   foundEl.textContent = '❌ Ошибка подключения к Мосбирже';
   foundEl.style.color = 'var(--accent2)';
   foundEl.style.borderColor = 'rgba(247,129,102,0.25)';
   foundEl.style.background = 'rgba(247,129,102,0.08)';
 }
}

// ─── PWA: УВЕДОМЛЕНИЯ О ВЫПЛАТАХ ───

async function requestNotifPermission() {
 if (!('Notification' in window)) return false;
 if (Notification.permission === 'granted') return true;
 if (Notification.permission === 'denied') return false;
 const perm = await Notification.requestPermission();
 return perm === 'granted';
}

function checkUpcomingCoupons() {
 if (!('Notification' in window) || Notification.permission !== 'granted') return;
 const today = new Date(); today.setHours(0,0,0,0);

 bonds.forEach(b => {
   const nc = couponData[b.isin]?.nextDate;
   if (!nc) return;
   const [y,mo,dy] = nc.split('-').map(Number);
   const d    = new Date(y, mo-1, dy);
   const diff = Math.round((d - today) / 86400000);

   // Уведомляем за 1 день и в день выплаты
   if (diff === 0 || diff === 1) {
     const rate  = couponData[b.isin]?.nextRate ?? b.rate;
     const total = Math.round((rate || 0) * b.qty);
     const when  = diff === 0 ? 'сегодня' : 'завтра';
     // Проверяем что ещё не уведомляли сегодня
     const notifKey = `notif_${b.isin}_${nc}`;
     if (!localStorage.getItem(notifKey)) {
       new Notification(`💰 Купон ${when}: ${b.name}`, {
         body: `${total.toLocaleString('ru-RU')} ₽ · ${b.qty} шт × ${(rate||0).toFixed(2)} ₽`,
         icon: 'https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f4b0.png',
         badge: 'https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f4c5.png',
         tag: notifKey,
       });
       localStorage.setItem(notifKey, '1');
       // Чистим старые ключи уведомлений (>30 дней)
       try {
         Object.keys(localStorage).filter(k => k.startsWith('notif_')).forEach(k => {
           const parts = k.split('_');
           const dateStr = parts[parts.length - 1];
           if (dateStr < new Date(Date.now() - 30*86400000).toISOString().slice(0,10)) {
             localStorage.removeItem(k);
           }
         });
       } catch {}
     }
   }
 });
}

// ─── КНОПКА УВЕДОМЛЕНИЙ В ПОРТФЕЛЕ ───
const _origRenderPortfolio = renderPortfolio;
renderPortfolio = function() {
 _origRenderPortfolio();
 const el = document.getElementById('portfolio-content');
 if (!el) return;

 const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
 const isPWA     = window.navigator.standalone === true;
 const hasNotif  = 'Notification' in window;
 const granted   = hasNotif && Notification.permission === 'granted';
 const denied    = hasNotif && Notification.permission === 'denied';

 let icon, title, desc, btn = '';

 if (isIOS && !isPWA) {
   // iPhone, обычный браузер — объясняем как добавить на экран
   icon  = '📲';
   title = 'Добавьте на экран «Домой»';
   desc  = 'Нажмите <b>Поделиться →  На экран «Домой»</b> — тогда уведомления о выплатах будут работать как в приложении.';
 } else if (isIOS && isPWA) {
   // iPhone, открыто как PWA
   if (granted) {
     icon = '🔔'; title = 'Уведомления включены';
     desc = 'Вы получаете уведомления за 1 день и в день выплаты купона.';
   } else if (denied) {
     icon = '🔕'; title = 'Уведомления заблокированы';
     desc = 'Разрешите уведомления в Настройки → Safari → Уведомления.';
   } else {
     icon = '🔔'; title = 'Уведомления о выплатах';
     desc = 'Получайте уведомления за 1 день и в день выплаты.';
     btn = `<button onclick="requestNotifPermission().then(ok=>{if(ok)renderPortfolio();})" style="background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.3);color:var(--accent);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;white-space:nowrap;">Включить</button>`;
   }
 } else if (!hasNotif) {
   icon = '🔔'; title = 'Уведомления недоступны';
   desc = 'Ваш браузер не поддерживает уведомления.';
 } else if (granted) {
   icon = '🔔'; title = 'Уведомления включены';
   desc = 'Вы получаете уведомления за 1 день и в день выплаты купона.';
 } else if (denied) {
   icon = '🔕'; title = 'Уведомления заблокированы';
   desc = 'Разрешите уведомления в настройках браузера.';
 } else {
   icon = '🔔'; title = 'Уведомления о выплатах';
   desc = 'Получайте уведомления за 1 день и в день выплаты.';
   btn = `<button onclick="requestNotifPermission().then(ok=>{if(ok)renderPortfolio();})" style="background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.3);color:var(--accent);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;white-space:nowrap;">Включить</button>`;
 }

 const notifHtml = `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:8px;display:flex;align-items:center;gap:12px;">
   <div style="font-size:24px;flex-shrink:0;">${icon}</div>
   <div style="flex:1;min-width:0;">
     <div style="font-size:14px;font-weight:700;">${title}</div>
     <div style="font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4;">${desc}</div>
   </div>
   ${btn}
 </div>`;
 el.insertAdjacentHTML('beforeend', notifHtml);
};

loadAll();
</script>
